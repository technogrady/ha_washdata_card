name: Issue Validator

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  validate-bug-report:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'bug')

    steps:
      - name: Validate bug report completeness
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const incompleteLabel = 'needs-more-info';

            // ── Checks ────────────────────────────────────────────────────────────
            const problems = [];

            // 1. Device Brand & Model — must not be blank or the placeholder
            const brandMatch = body.match(/###\s*Device Brand & Model\s*\n+([^\n#]+)/);
            const brand = brandMatch ? brandMatch[1].trim() : '';
            const brandIsNA = /^n\/?a$/i.test(brand);
            if (!brand || brand === 'Brand Model Number' || brand === 'Brand Model Number or N/A' || brand === '_No response_') {
              problems.push('**Device Brand & Model** is missing or still set to the placeholder value. Provide the actual brand and model (e.g. `Miele W1 WCG370`), or enter `N/A` if this bug is not related to a specific device.');
            }

            // 2. WashData version — must not be blank or the placeholder
            const versionMatch = body.match(/###\s*WashData Integration Version\s*\n+([^\n#]+)/);
            const version = versionMatch ? versionMatch[1].trim() : '';
            if (!version || version === 'vX.Y.Z' || version === '_No response_') {
              problems.push('**WashData Integration Version** is missing. You can find it in HACS or Settings → Integrations.');
            }

            // 3. HA version — must not be blank or the placeholder
            const haVersionMatch = body.match(/###\s*Home Assistant Version\s*\n+([^\n#]+)/);
            const haVersion = haVersionMatch ? haVersionMatch[1].trim() : '';
            if (!haVersion || haVersion === '2024.12.0' || haVersion === '_No response_') {
              problems.push('**Home Assistant Version** is missing. You can find it in Settings → About.');
            }

            // 4. Debug Logs — must contain actual log output, or a clear N/A with stated reason (min length to prevent bare "N/A")
            const logMatch = body.match(/###\s*Debug Logs\s*\n+([\s\S]*?)(?=\n###|$)/);
            const logContent = logMatch ? logMatch[1].trim() : '';
            const logIsExplainedNA = /^n\/?a\b.{10,}/i.test(logContent); // "N/A" followed by at least 10 chars of explanation
            const hasLogs = logContent &&
              logContent !== '_No response_' &&
              logContent !== 'Paste debug log output here...' &&
              logContent.length > 50;
            if (!hasLogs && !logIsExplainedNA) {
              problems.push('**Debug Logs** are missing or appear empty. This is the most important piece of information for diagnosing bugs. Please enable debug logging and paste the relevant log section. If logs are genuinely not applicable, write `N/A` followed by a clear explanation of why.');
            }

            // 5. Debug logs should contain 'ha_washdata' to confirm they're the right logs (skip if N/A)
            const logsHaveComponent = hasLogs && (
              logContent.includes('ha_washdata') ||
              logContent.includes('washdata')
            );
            if (hasLogs && !logsHaveComponent) {
              problems.push('**Debug Logs** do not appear to contain any `ha_washdata` entries. Please make sure debug logging is enabled for `custom_components.ha_washdata` and that you are reproducing the bug *after* enabling it.');
            }

            // ── Label management ─────────────────────────────────────────────────
            const currentLabels = issue.labels.map(l => l.name);
            const hasIncompleteLabel = currentLabels.includes(incompleteLabel);

            if (problems.length > 0) {
              // Add label if not already present
              if (!hasIncompleteLabel) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [incompleteLabel],
                });
              }

              const problemList = problems.map(p => `- ${p}`).join('\n');
              const comment = `👋 Hey @${issue.user.login}, thanks for the report!

              Looks like a few things are missing that we need before we can investigate:

              ${problemList}

              Please update the issue with the missing information. Without it, we won't be able to reproduce or debug the problem, and the issue may be closed.

              > **How to edit this issue:** click the three-dot menu (⋯) at the top-right of your post → *Edit*.

              _This check runs automatically. Once the issue is updated, it will be re-evaluated._`;

              // Only post a new comment if we haven't already (avoid comment spam on edits)
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
              });

              const botComments = comments.data.filter(
                c => c.user.type === 'Bot' && c.body.includes('missing that we need before we can investigate')
              );

              if (botComments.length === 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: comment,
                });
              } else {
                // Update the existing bot comment instead
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComments[0].id,
                  body: comment,
                });
              }
            } else if (hasIncompleteLabel) {
              // Everything looks good — remove the label and leave a positive note
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: incompleteLabel,
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Thanks for filling in the missing details, @${issue.user.login}! The issue looks complete now and has been queued for review. 🙌`,
              });
            }
